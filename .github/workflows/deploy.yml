name: Deploy Lambda

on:
  push:
    branches:
      - main
      - develop

jobs:
  deploy:
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        # Make sure @aws-sdk is in devDependencies in package.json so this command ignores it!
        run: npm ci --production

      - name: Zip Lambda function
        run: |
          cd src
          cp -r ../node_modules .
          zip -r ../deploy.zip .
          cd ..

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Deploy to AWS Lambda
        # Using the official AWS CLI directly prevents those endless hanging loops
        run: |
          FUNCTION_NAME="${{ github.ref == 'refs/heads/main' && 'process-contact-requests' || 'process-contact-requests' }}"
          aws lambda update-function-code \
            --function-name $FUNCTION_NAME \
            --zip-file fileb://deploy.zip
